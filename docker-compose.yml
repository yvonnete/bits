version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bits_postgres
    environment:
      POSTGRES_DB: db_bits
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5010:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bits_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bits_backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://root:root@postgres:5432/db_bits
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: db_bits
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: your-secret-key-change-this-in-production
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
    command: npm run dev:watch
    ports:
      - "4010:3001"
    depends_on:
      - postgres
    networks:
      - bits_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bits_frontend
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3001/api
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev -- --webpack
    ports:
      - "3010:3000"
    depends_on:
      - backend
    networks:
      - bits_network
  # Prisma Studio - Database GUI
  # prisma-studio:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: bits_prisma_studio
  #   environment:
  #     DATABASE_URL: postgresql://root:root@postgres:5432/db_bits
  #   volumes:
  #     - ./backend:/app
  #     - /app/node_modules
  #   command: npx prisma studio --hostname 0.0.0.0 --port 5555
  #   ports:
  #     - "5555:5555"
  #   depends_on:
  #     - postgres
  #   networks:
  #     - bits_network

volumes:
  postgres_data:
    external: true
    name: project_postgres_data

networks:
  bits_network:
    driver: bridge
